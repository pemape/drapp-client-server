services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tp-apvv-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-retinal_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tp-apvv-net

  # ─── Classifier service ───────────────────────────────────────────────────────
  classifier-service:
    image: ppetermm/image-preprocessing-ensemble-dr-classifier-service:latest
    container_name: tp-apvv-classifier-service
    restart: unless-stopped
    environment:
      AZURE_STORAGE_SAS_TOKEN: ${AZURE_STORAGE_SAS_TOKEN:-your-sas-token}
      PROCESSING_SERVICE_PORT: "${PROCESSING_SERVICE_PORT:-5032}"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "${LOG_FORMAT:-%(asctime)s - %(name)s - %(levelname)s - %(message)s}"
      LOG_FILE: ${LOG_FILE:-app.log}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${PROCESSING_SERVICE_PORT:-5032}:${PROCESSING_SERVICE_PORT:-5032}"
    networks:
      - tp-apvv-net

  # ─── Redis (for caching) ─────────────────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: tp-apvv-redis
    ports:
      - "6379:6379"
    networks:
      - tp-apvv-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  # ─── pgAdmin (PostgreSQL web admin) ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: tp-apvv-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tp-apvv-net

  # ─── Flask application ────────────────────────────────────────────────────────
  flask-app:
    # image: ghcr.io/${IMAGE_OWNER:-local}/tp-apvv-flask:${IMAGE_TAG:-latest}
    build:
      context: ../../
      dockerfile: build/docker/Dockerfile
    container_name: tp-apvv-flask
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      FLASK_PORT: "${FLASK_PORT:-8080}"
      # Point to the compose service name so inter-container routing works
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-retinal_db}
      PROCESSING_SERVICE_URL: http://classifier-service:${PROCESSING_SERVICE_PORT:-5032}
      PROCESSING_SERVICE_PORT: "${PROCESSING_SERVICE_PORT:-5032}"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: "${LOG_FORMAT:-%(asctime)s - %(name)s - %(levelname)s - %(message)s}"
      LOG_FILE: ${LOG_FILE:-app.log}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "${FLASK_PORT:-8080}:${FLASK_PORT:-8080}"
    volumes:
      # Persist uploaded files outside the container
      - uploads:/app/server/uploads
    depends_on:
      db:
        condition: service_healthy
      classifier-service:
        condition: service_started
    networks:
      - tp-apvv-net

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads:
  pgadmin_data:
  redis-data:

    # ─── Network ──────────────────────────────────────────────────────────────────
networks:
  tp-apvv-net:
    driver: bridge
