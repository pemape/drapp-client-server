services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tp2025-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-retinal_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tp2025-net

  # ─── Mock inference server (FastAPI / uvicorn) ───────────────────────────────
  mock-api:
    # image: is used by CI to push/pull from GHCR; IMAGE_OWNER and IMAGE_TAG are
    # set automatically by the deploy workflow. For local dev they default to
    # 'local' / 'latest' and the image stays on-machine only.
    # image: ghcr.io/${IMAGE_OWNER:-local}/tp2025-mock-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: build/docker/Dockerfile.mock
    container_name: tp2025-mock-api
    restart: unless-stopped
    environment:
      MOCK_API_PORT: "5000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: app.log
    ports:
      - "${MOCK_API_PORT:-5000}:5000"
    networks:
      - tp2025-net

  # ─── Flask application ────────────────────────────────────────────────────────
  flask-app:
    # image: ghcr.io/${IMAGE_OWNER:-local}/tp2025-flask:${IMAGE_TAG:-latest}
    build:
      context: ./flask-app
      dockerfile: build/docker/Dockerfile
    container_name: tp2025-flask
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      FLASK_PORT: "8080"
      # Point to the compose service name so inter-container routing works
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-retinal_db}
      SQLALCHEMY_DATABASE_URI: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-retinal_db}
      MOCK_API_URL: http://mock-api:5000
      MOCK_API_PORT: "5000"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: app.log
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "${FLASK_PORT:-8080}:8080"
    volumes:
      # Persist uploaded files outside the container
      - uploads:/app/server/uploads
    depends_on:
      db:
        condition: service_healthy
      mock-api:
        condition: service_started
    networks:
      - tp2025-net

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads:

# ─── Network ──────────────────────────────────────────────────────────────────
networks:
  tp2025-net:
    driver: bridge
